name: Deploy Backend (App Service)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC system libraries
        run: sudo apt-get install -y unixodbc-dev

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest tests/unit tests/integration -x --tb=short
        env:
          DATABASE_URL: "sqlite:///./test-ci.db"
          PYTHONPATH: backend

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Upload (~1 min) + async deploy trigger + health-check polling (≤15 min).
    # The synchronous Oryx build has been eliminated; this guard covers the rest.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate backend deployment settings
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ]; then
            echo "ERROR: Set AZURE_WEBAPP_NAME in GitHub secrets."
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build backend package (with pre-installed dependencies)
        run: |
          # Derive the minor version from the interpreter so the path stays
          # in sync if the setup-python version is ever bumped.
          PY_MINOR=$(python3 --version | cut -d' ' -f2 | cut -d'.' -f1-2)

          # Pre-install pip dependencies into antenv/ so Azure App Service does not
          # need to run Oryx server-side pip install after deployment.  This is the
          # standard layout expected by the Python App Service worker (PYTHONPATH
          # already includes /home/site/wwwroot/antenv/lib/python*/site-packages).
          pip install \
            --quiet \
            --target "backend/antenv/lib/python${PY_MINOR}/site-packages" \
            -r backend/requirements.txt

          cd backend
          zip -r ../backend.zip . \
            -x "venv/*" -x ".venv/*" -x "env/*" \
            -x "*.pyc" -x "__pycache__/*" \
            -x ".pytest_cache/*" -x ".coverage" \
            -x "*.db" -x "*.sqlite3" \
            -x ".env" -x ".env.*" \
            -x "storage/*"
          # antenv/ is intentionally included so Azure has pre-built packages.

          # Remove the temporary antenv directory so it is not left in the workspace.
          rm -rf antenv

      - name: Deploy backend package (async)
        # Use az cli directly so the command returns immediately after upload.
        # azure/webapps-deploy@v3 blocks synchronously waiting for Oryx to finish,
        # which caused the previous 30-minute cancellation.
        # The CLI returns non-zero if the upload fails (caught by bash -e).
        # Deployment completion is validated by the health-check step below.
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src-path ./backend.zip \
            --type zip \
            --async true

      - name: Verify backend HTTP readiness
        run: |
          url="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          echo "Polling health endpoint until backend is ready: $url"
          for i in $(seq 1 90); do
            if curl -fsS --max-time 10 "$url" >/dev/null; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Health check not ready yet (attempt $i/90); waiting 10s..."
            sleep 10
          done
          echo "ERROR: backend health check did not pass within 15 minutes"
          exit 1

      - name: Apply post-deploy configuration
        run: |
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --settings \
              PFCD_CORS_ORIGINS="${{ secrets.PFCD_CORS_ORIGINS }}" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false"
