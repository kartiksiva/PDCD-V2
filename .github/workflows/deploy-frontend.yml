name: Deploy Frontend (Static Web Apps)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend deployment settings
        run: |
          if [ -z "${{ secrets.VITE_API_BASE }}" ]; then
            echo "ERROR: Set VITE_API_BASE in GitHub secrets."
            exit 1
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          # Set to App Service URL if NOT using SWA linked backend.
          # Leave empty when using SWA linked backend (API calls stay relative /api).
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true

      - name: Verify backend reachability from deploy runner
        run: |
          url="${{ secrets.VITE_API_BASE }}/health"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 "$url" >/dev/null; then
              echo "Backend health check passed on attempt $i"
              exit 0
            fi
            echo "Not ready yet (attempt $i/12); waiting 10s..."
            sleep 10
          done
          echo "ERROR: backend at $url did not respond within 2 minutes"
          exit 1
