name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build zip
        run: cd backend && zip -r ../worker.zip . -x "*.pyc" -x "__pycache__/*"
      - uses: actions/upload-artifact@v4
        with:
          name: worker-zip
          path: worker.zip

  deploy-extracting:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: worker-zip
      - uses: azure/login@v2
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'
      - name: Deploy extracting worker
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --src-path worker.zip --type zip --async true
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --settings PFCD_WORKER_ROLE=extracting \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --startup-file "python -m app.workers.runner"
      - name: Verify extracting worker is running
        run: |
          echo "Waiting for Kudu to finish extracting zip..."
          sleep 60
          state=$(az webapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --query "state" -o tsv)
          echo "App state: $state"
          if [ "$state" != "Running" ]; then
            echo "ERROR: extracting worker is not Running (state=$state)"
            exit 1
          fi
      - name: Verify extracting worker runtime logs
        run: |
          zip=/tmp/extracting-worker-logs.zip
          out=/tmp/extracting-worker-logs
          rm -rf "$out"
          mkdir -p "$out"
          az webapp log download \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --log-file "$zip"
          unzip -o "$zip" -d "$out" >/dev/null
          if ! grep -R "Health server listening on port 8000" "$out" >/dev/null; then
            echo "ERROR: extracting worker did not log health server startup"
            exit 1
          fi
          if ! grep -R "Worker listening on phase extracting" "$out" >/dev/null; then
            echo "ERROR: extracting worker did not enter receive loop"
            exit 1
          fi

  deploy-processing:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: worker-zip
      - uses: azure/login@v2
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'
      - name: Deploy processing worker
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --src-path worker.zip --type zip --async true
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --settings PFCD_WORKER_ROLE=processing \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --startup-file "python -m app.workers.runner"
      - name: Verify processing worker is running
        run: |
          echo "Waiting for Kudu to finish extracting zip..."
          sleep 60
          state=$(az webapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --query "state" -o tsv)
          echo "App state: $state"
          if [ "$state" != "Running" ]; then
            echo "ERROR: processing worker is not Running (state=$state)"
            exit 1
          fi
      - name: Verify processing worker runtime logs
        run: |
          zip=/tmp/processing-worker-logs.zip
          out=/tmp/processing-worker-logs
          rm -rf "$out"
          mkdir -p "$out"
          az webapp log download \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --log-file "$zip"
          unzip -o "$zip" -d "$out" >/dev/null
          if ! grep -R "Health server listening on port 8000" "$out" >/dev/null; then
            echo "ERROR: processing worker did not log health server startup"
            exit 1
          fi
          if ! grep -R "Worker listening on phase processing" "$out" >/dev/null; then
            echo "ERROR: processing worker did not enter receive loop"
            exit 1
          fi

  deploy-reviewing:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: worker-zip
      - uses: azure/login@v2
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'
      - name: Deploy reviewing worker
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --src-path worker.zip --type zip --async true
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --settings PFCD_WORKER_ROLE=reviewing \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --startup-file "python -m app.workers.runner"
      - name: Verify reviewing worker is running
        run: |
          echo "Waiting for Kudu to finish extracting zip..."
          sleep 60
          state=$(az webapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
