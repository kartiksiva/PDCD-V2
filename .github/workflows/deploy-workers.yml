            --query "state" -o tsv)
          echo "App state: $state"
          if [ "$state" != "Running" ]; then
            echo "ERROR: reviewing worker is not Running (state=$state)"
            exit 1
          fi
      - name: Verify reviewing worker runtime logs
        run: |
          zip=/tmp/reviewing-worker-logs.zip
          out=/tmp/reviewing-worker-logs
          rm -rf "$out"
          mkdir -p "$out"
          az webapp log download \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --log-file "$zip"
          unzip -o "$zip" -d "$out" >/dev/null
          if ! grep -R "Health server listening on port 8000" "$out" >/dev/null; then
            echo "ERROR: reviewing worker did not log health server startup"
            exit 1
          fi
          if ! grep -R "Worker listening on phase reviewing" "$out" >/dev/null; then
            echo "ERROR: reviewing worker did not enter receive loop"
            exit 1
          fi
