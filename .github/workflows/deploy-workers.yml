name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build zip
        run: |
          cd backend && zip -r ../worker.zip . \
            -x "venv/*" -x ".venv/*" -x "env/*" \
            -x "*.pyc" -x "__pycache__/*" \
            -x ".pytest_cache/*" -x ".coverage" \
            -x "*.db" -x "*.sqlite3" \
            -x ".env" -x ".env.*" \
            -x "storage/*"
      - uses: actions/upload-artifact@v4
        with:
          name: worker-zip
          path: worker.zip

  deploy-extracting:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: worker-zip
      - uses: azure/login@v2
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'
      - name: Deploy extracting worker
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --src-path worker.zip --type zip --async true --track-status false
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --settings PFCD_WORKER_ROLE=extracting \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
            --startup-file "python -m app.workers.runner"
      - name: Verify extracting worker is running
        run: |
          for i in $(seq 1 60); do
            state=$(az webapp show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
              --query "state" -o tsv)
            echo "extracting state check $i/60: $state"
            if [ "$state" = "Running" ]; then
              echo "Extracting worker is Running"
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: extracting worker did not reach Running state within 20 minutes"
          exit 1
      - name: Verify extracting worker runtime logs
        run: |
          for i in $(seq 1 30); do
            zip=/tmp/extracting-worker-logs.zip
            out=/tmp/extracting-worker-logs
            rm -rf "$out"
            mkdir -p "$out"
            if az webapp log download \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WORKER_EXTRACTING_NAME }} \
              --log-file "$zip" >/dev/null 2>&1; then
              unzip -o "$zip" -d "$out" >/dev/null 2>&1 || true
              if grep -R "Health server listening on port 8000" "$out" >/dev/null \
                && grep -R "Worker listening on phase extracting" "$out" >/dev/null; then
                echo "Extracting worker runtime logs verified"
                exit 0
              fi
            fi
            echo "extracting runtime logs not ready yet (attempt $i/30); waiting 20s..."
            sleep 20
          done
          echo "ERROR: extracting worker runtime log markers not found within 10 minutes"
          exit 1

  deploy-processing:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: worker-zip
      - uses: azure/login@v2
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'
      - name: Deploy processing worker
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --src-path worker.zip --type zip --async true --track-status false
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --settings PFCD_WORKER_ROLE=processing \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
            --startup-file "python -m app.workers.runner"
      - name: Verify processing worker is running
        run: |
          for i in $(seq 1 60); do
            state=$(az webapp show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
              --query "state" -o tsv)
            echo "processing state check $i/60: $state"
            if [ "$state" = "Running" ]; then
              echo "Processing worker is Running"
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: processing worker did not reach Running state within 20 minutes"
          exit 1
      - name: Verify processing worker runtime logs
        run: |
          for i in $(seq 1 30); do
            zip=/tmp/processing-worker-logs.zip
            out=/tmp/processing-worker-logs
            rm -rf "$out"
            mkdir -p "$out"
            if az webapp log download \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WORKER_PROCESSING_NAME }} \
              --log-file "$zip" >/dev/null 2>&1; then
              unzip -o "$zip" -d "$out" >/dev/null 2>&1 || true
              if grep -R "Health server listening on port 8000" "$out" >/dev/null \
                && grep -R "Worker listening on phase processing" "$out" >/dev/null; then
                echo "Processing worker runtime logs verified"
                exit 0
              fi
            fi
            echo "processing runtime logs not ready yet (attempt $i/30); waiting 20s..."
            sleep 20
          done
          echo "ERROR: processing worker runtime log markers not found within 10 minutes"
          exit 1

  deploy-reviewing:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: worker-zip
      - uses: azure/login@v2
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'
      - name: Deploy reviewing worker
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --src-path worker.zip --type zip --async true --track-status false
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --settings PFCD_WORKER_ROLE=reviewing \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
            --startup-file "python -m app.workers.runner"
      - name: Verify reviewing worker is running
        run: |
          for i in $(seq 1 60); do
            state=$(az webapp show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
              --query "state" -o tsv)
            echo "reviewing state check $i/60: $state"
            if [ "$state" = "Running" ]; then
              echo "Reviewing worker is Running"
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: reviewing worker did not reach Running state within 20 minutes"
          exit 1
      - name: Verify reviewing worker runtime logs
        run: |
          for i in $(seq 1 30); do
            zip=/tmp/reviewing-worker-logs.zip
            out=/tmp/reviewing-worker-logs
            rm -rf "$out"
            mkdir -p "$out"
            if az webapp log download \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WORKER_REVIEWING_NAME }} \
              --log-file "$zip" >/dev/null 2>&1; then
              unzip -o "$zip" -d "$out" >/dev/null 2>&1 || true
              if grep -R "Health server listening on port 8000" "$out" >/dev/null \
