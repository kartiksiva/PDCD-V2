                echo "Reviewing worker runtime logs verified"
                exit 0
              fi
            fi
            echo "reviewing runtime logs not ready yet (attempt $i/30); waiting 20s..."
            sleep 20
          done
          echo "ERROR: reviewing worker runtime log markers not found within 10 minutes"
          exit 1
